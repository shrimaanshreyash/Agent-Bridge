# agentbridge.yaml — AgentBridge Demo Pipeline
name: code-quality-pipeline
version: 1.0.0

registry:
  port: 6100

agents:
  code-review:
    path: ./agents/code-review
    port: 6101
    env:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MODEL: google/gemini-2.5-flash-lite

  test-writer:
    path: ./agents/test-writer
    port: 6102
    env:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MODEL: google/gemini-2.5-flash-lite

  doc-generator:
    path: ./agents/doc-generator
    port: 6103
    env:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      MODEL: google/gemini-2.5-flash-lite

workflows:
  full-review:
    description: "Complete code quality pipeline: review → tests → docs"
    steps:
      - agent: code-review
        input: $input
        output: $review

      - agent: test-writer
        input: $input
        output: $tests
        condition: $review.score < 90

      - agent: doc-generator
        input: $input
        output: $docs

    output:
      review: $review
      tests: $tests
      docs: $docs

dashboard:
  enabled: true
  port: 6140

mcp:
  enabled: true
  transport: stdio
